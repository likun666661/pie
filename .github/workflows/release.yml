name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "tag to publish (e.g. v0.75.0)"
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install cross
        if: matrix.cross == true
        run: |
          cargo install cross --locked
          echo "CARGO_BIN=cross" >> "$GITHUB_ENV"

      - name: build
        run: |
          BIN="${CARGO_BIN:-cargo}"
          $BIN build --release --target ${{ matrix.target }} -p pie-coding-agent
        shell: bash

      - name: package
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [ -z "$tag" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          fi
          name="pie-${tag}-${{ matrix.target }}"
          mkdir -p dist/"$name"
          cp target/${{ matrix.target }}/release/pie dist/"$name"/
          cp README.md LICENSE dist/"$name"/ 2>/dev/null || true
          tar -C dist -czf dist/"$name".tar.gz "$name"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "asset=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.name }}
          path: ${{ steps.pkg.outputs.asset }}

  release:
    name: github release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: gather artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: list assets
        run: |
          find dist -type f -name "*.tar.gz" | sort
      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.tar.gz
          generate_release_notes: true
          # Allow running on workflow_dispatch with a manual tag.
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
