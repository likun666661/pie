name: deploy-fefe

# Deploy the pie.0xfefe.me Cloudflare Worker.
#
# Security model (RFC #18 §8.2):
#   - CF_API_KEY is a GitHub repository secret; only the protected `production`
#     environment job can access it. Build/test CI (.github/workflows/ci.yml) has
#     no Cloudflare access.
#   - `production` environment is configured (in repo settings) with branch
#     policy = `main` only. Per @EdHuang 2026-05-30, the environment does NOT
#     require per-run human approval — any authorized team member can trigger a
#     deploy. The environment still scopes the secret to deploy/rollback jobs.
#   - Triggers: manual `workflow_dispatch` only. Auto-deploy on push is OFF.
#   - The deploy step is the only place `CF_API_KEY` is exposed, scoped to the
#     step's env block. No `set -x`, no `printenv`, no wrangler debug logging.
#   - Inputs (`wrangler_version`, `worker_dir`) are validated in a non-secret
#     step and emitted as step outputs. The secret-bearing deploy step reads
#     only `steps.validate.outputs.*` — defense in depth against
#     dispatch-input injection (per @Provider-Auth-Lead PR #140 review).
#   - Logs / artifacts / cache MUST NOT contain CF_API_KEY, hub session, agent
#     token, or any notification payload secret. Wrangler hides the token by
#     default; we additionally avoid `--var KEY=$CF_API_KEY` patterns.
#
# Rollback: see deploy-fefe-rollback.yml. Pinning to a known-good deployment id.
#
# Tracking: RFC #18 §8 (gate 5 = real deploy, gate 6 = deployed-Worker e2e).

on:
  workflow_dispatch:
    inputs:
      worker_dir:
        description: "Worker source directory (default: workers/fefe-hub)"
        required: false
        default: "workers/fefe-hub"
      wrangler_version:
        description: "Pinned wrangler version (default: 3)"
        required: false
        default: "3"

# Workflow-level concurrency: a second deploy invocation cancels the first
# in-flight invocation rather than racing into Cloudflare. This is intentional
# — partial deploys are easier to reason about as "did not run" than "may have
# raced".
concurrency:
  group: deploy-fefe-production
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy worker to pie.0xfefe.me
    runs-on: ubuntu-latest

    # Protected environment. Branch policy = `main` only (configured in repo
    # settings). Per @EdHuang 2026-05-30, the environment does NOT require
    # per-run human approval — any authorized team member can trigger a
    # deploy via `workflow_dispatch`.
    environment:
      name: production
      url: https://pie.0xfefe.me

    # The branch / ref guard. Defense in depth on top of the environment's
    # `Deployment branches` policy.
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          # Pin to the exact commit being deployed. Recorded in the post-deploy
          # report alongside `deployment_id` so the bounded e2e report can join
          # source → deployment.
          fetch-depth: 1

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: validate inputs
        id: validate
        env:
          WORKER_DIR: ${{ inputs.worker_dir }}
          WRANGLER_VERSION: ${{ inputs.wrangler_version }}
        run: |
          # All input validation BEFORE any step that exposes CF_API_KEY.
          # No secret use here. Validated values are written as step outputs;
          # downstream secret-bearing steps consume the outputs, not the raw
          # dispatch inputs (per @Provider-Auth-Lead review on PR #140).
          set -eu
          # worker_dir: must be a relative path inside the repo, contain a
          # wrangler config.
          case "$WORKER_DIR" in
            /*|*..*) echo "::error::worker_dir must be a relative path inside the repo"; exit 1 ;;
          esac
          if [ ! -d "$WORKER_DIR" ]; then
            echo "::error::worker_dir '$WORKER_DIR' does not exist"
            exit 1
          fi
          if [ ! -f "$WORKER_DIR/wrangler.toml" ] && [ ! -f "$WORKER_DIR/wrangler.jsonc" ]; then
            echo "::error::worker_dir '$WORKER_DIR' does not contain wrangler.toml or wrangler.jsonc"
            exit 1
          fi
          # wrangler_version: strict numeric semver-prefix pattern. Refuses
          # anything that could inject shell metacharacters into the secret-
          # bearing deploy step. Allowed shapes:
          #   "3"        (major)
          #   "3.93"     (major.minor)
          #   "3.93.0"   (major.minor.patch)
          if ! printf '%s' "$WRANGLER_VERSION" | grep -Eq '^[0-9]+(\.[0-9]+){0,2}$'; then
            echo "::error::wrangler_version '$WRANGLER_VERSION' is not a strict semver prefix (allowed: '3', '3.93', '3.93.0')"
            exit 1
          fi
          # Emit validated values as step outputs. The deploy step MUST read
          # `steps.validate.outputs.wrangler_version` rather than
          # `inputs.wrangler_version` so that if this validation block is ever
          # weakened/removed, the secret-bearing step does not see the raw
          # dispatch input.
          echo "wrangler_version=$WRANGLER_VERSION" >> "$GITHUB_OUTPUT"
          echo "worker_dir=$WORKER_DIR" >> "$GITHUB_OUTPUT"

      - name: install dependencies
        working-directory: ${{ steps.validate.outputs.worker_dir }}
        run: |
          # Use npm ci when a lockfile exists; fall back to npm install.
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: embed shared viewer HTML
        # The relay serves the same viewer page as the local web UI
        # (crates/coding-agent/src/ui/web_index.html). The generated TS module is
        # gitignored, so produce it here before wrangler bundles the worker.
        working-directory: ${{ steps.validate.outputs.worker_dir }}
        run: node scripts/embed-html.mjs

      - name: apply D1 migrations
        working-directory: ${{ steps.validate.outputs.worker_dir }}
        # `CF_API_KEY` is exposed only to protected deploy-lane Cloudflare
        # steps. This migration step uses the same validated wrangler version
        # and worker directory as the deploy step; it does not read raw
        # workflow inputs.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_KEY }}
          WRANGLER_VERSION: ${{ steps.validate.outputs.wrangler_version }}
        run: |
          # Run schema migrations before deploy so first live e2e can exercise
          # register/login/notification paths against the real D1 database.
          printf 'y\n' | npx --yes "wrangler@${WRANGLER_VERSION}" d1 migrations apply pie_fefe_hub \
            --remote

      - name: deploy worker
        id: deploy
        working-directory: ${{ steps.validate.outputs.worker_dir }}
        # `CF_API_KEY` is exposed ONLY to this step. Wrangler reads it as
        # `CLOUDFLARE_API_TOKEN` (its canonical env name); we alias here so
        # operators only have one GitHub secret name to remember.
        # `WRANGLER_VERSION` is read from `steps.validate.outputs` — not from
        # `inputs.wrangler_version` directly — so the secret step is bound to
        # the validated value, not the raw dispatch input (per
        # @Provider-Auth-Lead PR #140 review).
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_KEY }}
          WRANGLER_VERSION: ${{ steps.validate.outputs.wrangler_version }}
        run: |
          # Pin wrangler version to avoid drift. Quiet logging — no debug, no
          # echo, no env dump.
          npx --yes "wrangler@${WRANGLER_VERSION}" deploy \
            --name pie-hub \
            --keep-vars \
            --outdir ./dist
          echo "deployed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: record deployment metadata (bounded)
        env:
          # No secrets here. This step writes ONLY bounded metadata that is
          # safe to surface in the deploy report (per §8.6 forbidden-values
          # list).
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_REF: ${{ github.ref_name }}
          DEPLOYED_AT: ${{ steps.deploy.outputs.deployed_at }}
        run: |
          {
            echo "## fefe deploy report (bounded)"
            echo ""
            echo "- worker: pie-hub"
            echo "- domain: pie.0xfefe.me"
            echo "- version: $DEPLOY_SHA"
            echo "- ref: $DEPLOY_REF"
            echo "- deployed_at: $DEPLOYED_AT"
            echo ""
            echo "Post-deploy e2e (RFC #18 §8.5) is a separate job; this step records"
            echo "the deploy-only metadata. Forbidden values per §8.6 are not emitted."
          } >> "$GITHUB_STEP_SUMMARY"
