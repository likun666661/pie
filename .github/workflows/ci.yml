name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: cargo registry cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: clippy-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            clippy-${{ runner.os }}-
      # `--workspace` + `--all-targets` covers every crate's lib/bin/tests/examples. All 10
      # providers are linted because `pie-coding-agent` already activates the `all-providers`
      # feature on `pie-ai` (feature unification across the workspace).
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: install rust
        uses: dtolnay/rust-toolchain@stable
      - name: cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: test-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            test-${{ runner.os }}-
      - name: cargo test --workspace
        # Strip all provider env vars so any test that accidentally hits a real API will
        # self-skip / error cleanly. Mirrors the TS repo's `test.sh` discipline.
        env:
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
          OPENROUTER_API_KEY: ""
          GROQ_API_KEY: ""
          MISTRAL_API_KEY: ""
          GEMINI_API_KEY: ""
          GOOGLE_API_KEY: ""
          AWS_BEARER_TOKEN_BEDROCK: ""
          GOOGLE_VERTEX_ACCESS_TOKEN: ""
          CODEX_AUTH_TOKEN: ""
          AZURE_OPENAI_API_KEY: ""
        run: cargo test --workspace
