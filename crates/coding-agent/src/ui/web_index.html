<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>pie web</title>
  <script>
    try {
      const theme = localStorage.getItem('pie-web-theme');
      if (theme === 'dark' || theme === 'light') {
        document.documentElement.dataset.theme = theme;
      }
    } catch (_) {}
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f7;
      --panel: #ffffff;
      --side: #fafafa;
      --field: #ffffff;
      --button-bg: #111111;
      --button-fg: #ffffff;
      --ink: #111111;
      --muted: #6b6b6b;
      --faint: #9a9a9a;
      --line: #d8d8d8;
      --line-strong: #b9b9b9;
      --soft: #eeeeee;
      --poll-bg: #fbfbfb;
      --overlay: rgba(255, 255, 255, 0.72);
      --shadow: rgba(0, 0, 0, 0.14);
      --tool: #5f5f5f;
      --tool-output: #8a8a8a;
    }
    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #050505;
      --panel: #0b0b0b;
      --side: #080808;
      --field: #111111;
      --button-bg: #f4f4f4;
      --button-fg: #050505;
      --ink: #f4f4f4;
      --muted: #a1a1a1;
      --faint: #686868;
      --line: #262626;
      --line-strong: #4a4a4a;
      --soft: #1b1b1b;
      --poll-bg: #101010;
      --overlay: rgba(0, 0, 0, 0.72);
      --shadow: rgba(0, 0, 0, 0.5);
      --tool: #bcbcbc;
      --tool-output: #777777;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    :root {
      --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
        "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 15px/1.6 var(--font-ui);
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
    }
    button, textarea { font: inherit; color: inherit; }
    .app {
      height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      background: var(--panel);
      overflow: hidden;
    }
    .app[data-sidebar="hidden"] {
      grid-template-columns: minmax(0, 1fr);
    }
    .app[data-sidebar="hidden"] aside {
      display: none;
    }
    .app[data-sidebar="hidden"] .workspace {
      border-right: 0;
    }
    .workspace {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      border-right: 1px solid var(--line);
    }
    header {
      min-height: 52px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .brand { display: flex; align-items: baseline; gap: 10px; min-width: 0; }
    .brand strong { font-size: 15px; font-weight: 650; letter-spacing: 0; }
    .cwd-chip {
      min-width: 0;
      max-width: min(320px, 34vw);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 1px 8px;
      color: var(--muted);
      background: var(--field);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .meta {
      min-width: 0;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .run-state {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }
    .header-actions {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--faint);
    }
    .run-state.busy .dot { background: var(--ink); }
    .content {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }
    #poll {
      display: none;
      padding: 9px 18px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      background: var(--poll-bg);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #poll.visible { display: block; }
    #feed {
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 24px max(20px, calc((100% - 860px) / 2)) 28px;
      overflow-wrap: anywhere;
      scroll-behavior: smooth;
    }
    .line {
      min-height: 1.5em;
      padding: 1px 0;
    }
    .line:empty::before { content: " "; }
    .feed-block {
      position: relative;
      margin: 0 0 18px;
      overflow-wrap: anywhere;
      max-width: 100%;
      min-width: 0;
    }
    .markdown pre { max-width: 100%; }
    .feed-head {
      position: absolute;
      top: -8px;
      right: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 2;
    }
    .feed-meta {
      color: var(--faint);
      font-size: 11px;
      min-width: 0;
    }
    .copy-button {
      flex: 0 0 auto;
      width: 44px;
      height: 24px;
      padding: 0;
      border-color: var(--line-strong);
      background: var(--field);
      color: var(--muted);
      font-size: 11px;
      opacity: 0;
    }
    .feed-block:hover .copy-button,
    .feed-block:focus-within .copy-button,
    .copy-button.copied,
    .copy-button.copy-error {
      opacity: 1;
    }
    .copy-button:hover {
      color: var(--ink);
      filter: none;
      background: var(--soft);
    }
    .copy-button.copied {
      border-color: var(--ink);
      color: var(--ink);
    }
    .copy-button.copy-error {
      border-color: var(--ink);
      color: var(--ink);
    }
    .feed-user { display: flex; justify-content: flex-end; }
    .feed-user .feed-body {
      color: var(--ink);
      white-space: pre-wrap;
      background: var(--soft);
      border-radius: 18px 18px 6px 18px;
      padding: 10px 16px;
      max-width: min(78%, 640px);
    }
    .feed-user .feed-head { top: auto; bottom: -6px; right: -2px; }
    .feed-assistant { padding-right: 28px; }
    .feed-thinking .feed-body {
      color: var(--muted);
      font-style: italic;
      font-size: 13.5px;
      white-space: pre-wrap;
      border-left: 2px solid var(--line);
      padding-left: 12px;
    }
    /* System/status lines: quiet, small, monospaced — context, not conversation. */
    .feed-plain { margin-bottom: 8px; }
    .feed-plain .feed-body, .feed-plain .markdown {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .feed-plain.level_error .feed-body, .feed-plain.level_error .markdown { color: var(--ink); }
    .markdown {
      color: var(--ink);
    }
    .markdown > :first-child { margin-top: 0; }
    .markdown > :last-child { margin-bottom: 0; }
    .markdown p { margin: 0 0 10px; }
    .markdown h1, .markdown h2, .markdown h3, .markdown h4, .markdown h5, .markdown h6 {
      margin: 14px 0 8px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .markdown h1 { font-size: 18px; }
    .markdown h2 { font-size: 16px; }
    .markdown h3 { font-size: 14px; }
    .markdown h4, .markdown h5, .markdown h6 { font-size: 13.5px; color: var(--muted); }
    .markdown ul, .markdown ol {
      margin: 0 0 10px 22px;
      padding: 0;
    }
    .markdown li { margin: 3px 0; }
    .markdown blockquote {
      margin: 0 0 10px;
      padding: 0 0 0 12px;
      border-left: 2px solid var(--line-strong);
      color: var(--muted);
    }
    .markdown pre {
      margin: 0 0 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--side);
      overflow: auto;
      white-space: pre;
      font-family: var(--font-mono);
      font-size: 13px;
    }
    .markdown code {
      border: 1px solid var(--line);
      border-radius: 5px;
      background: var(--side);
      padding: 1px 5px;
      font-family: var(--font-mono);
      font-size: 0.88em;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }
    .markdown pre code {
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
    }
    .markdown a {
      color: var(--ink);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .tool-details {
      margin: 0 0 12px;
      color: var(--tool);
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--side);
      overflow: hidden;
    }
    .tool-details summary {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 12px;
      font-family: var(--font-mono);
      font-size: 12px;
      outline: none;
      list-style: none;
    }
    .tool-details summary::-webkit-details-marker { display: none; }
    .tool-details summary::before { content: "▸"; color: var(--faint); margin-right: 8px; flex: 0 0 auto; }
    .tool-details[open] summary::before { content: "▾"; }
    .tool-details summary span {
      min-width: 0;
      flex: 1 1 auto;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tool-details summary:hover { color: var(--ink); }
    .tool-details .feed-head, .tool-details .copy-button { position: static; }
    .tool-output {
      margin: 0;
      padding: 10px 12px;
      border-top: 1px solid var(--line);
      color: var(--tool-output);
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      max-height: 280px;
      overflow: auto;
    }
    footer {
      padding: 12px max(20px, calc((100% - 860px) / 2));
      padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid var(--line);
      background: var(--panel);
    }
    .completion-popup {
      display: none;
      max-height: min(220px, 32vh);
      overflow: auto;
      margin-bottom: 8px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: var(--field);
      box-shadow: 0 10px 30px var(--shadow);
    }
    .completion-popup.visible { display: block; }
    .completion-item {
      width: 100%;
      height: 34px;
      display: flex;
      align-items: center;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      text-align: left;
      padding: 0 11px;
    }
    .completion-item:last-child { border-bottom: 0; }
    .completion-item.selected,
    .completion-item:hover {
      background: var(--soft);
      filter: none;
    }
    form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto auto;
      gap: 8px;
      align-items: center;
    }
    textarea {
      width: 100%;
      height: 42px;
      min-height: 42px;
      max-height: 42px;
      resize: none;
      border: 1px solid var(--line-strong);
      border-radius: 21px;
      background: var(--field);
      padding: 10px 16px;
      outline: none;
      font-family: var(--font-ui);
      font-size: 15px;
      transition: border-color 120ms ease;
    }
    textarea:focus { border-color: var(--ink); }
    button {
      height: 38px;
      border: 1px solid var(--ink);
      border-radius: 999px;
      background: var(--button-bg);
      color: var(--button-fg);
      padding: 0 14px;
      cursor: pointer;
      transition: opacity 120ms ease, background 120ms ease;
    }
    button:hover { opacity: 0.85; }
    button.secondary {
      border-color: transparent;
      background: transparent;
      color: var(--muted);
    }
    button.secondary:hover { background: var(--soft); color: var(--ink); opacity: 1; }
    button.icon-button {
      width: 38px;
      min-width: 38px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-size: 16px;
      line-height: 1;
    }
    .attachment-strip {
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .attachment-strip.visible { display: flex; }
    .attachment-chip {
      min-width: 0;
      max-width: 260px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: var(--field);
      color: var(--muted);
      padding: 0 5px 0 8px;
      font-size: 12px;
    }
    .attachment-chip span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .attachment-chip button {
      width: 20px;
      min-width: 20px;
      height: 20px;
      border-color: var(--line-strong);
      background: transparent;
      color: var(--muted);
      padding: 0;
    }
    .attachment-chip button:hover {
      color: var(--ink);
      filter: none;
      background: var(--soft);
    }
    .hidden-input { display: none; }
    .theme-toggle {
      border-color: var(--line-strong);
      background: var(--field);
      color: var(--ink);
    }
    .sidebar-toggle {
      border-color: var(--line-strong);
      background: var(--field);
      color: var(--ink);
    }
    button:hover { filter: contrast(0.92); }
    .form-hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    aside {
      min-width: 0;
      min-height: 0;
      overflow: auto;
      background: var(--side);
    }
    .side-head {
      min-height: 56px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .side-title { font-weight: 650; }
    .side-subtle { color: var(--muted); font-size: 12px; }
    .side-section {
      padding: 15px 16px;
      border-bottom: 1px solid var(--line);
    }
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .section-head h2 {
      margin: 0;
      font-size: 12px;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 700;
    }
    .count { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: var(--field);
    }
    .metric {
      min-width: 0;
      padding: 8px;
      border-right: 1px solid var(--line);
    }
    .metric:last-child { border-right: 0; }
    .metric b { display: block; font-size: 16px; line-height: 1.2; }
    .metric span { display: block; color: var(--muted); font-size: 11px; }
    button.metric {
      width: 100%;
      height: auto;
      min-height: 48px;
      border: 0;
      border-right: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
    }
    button.metric:hover { background: var(--soft); filter: none; }
    .detail-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--overlay);
      z-index: 18;
    }
    .detail-modal.visible { display: flex; }
    .detail-panel {
      width: min(560px, 100%);
      max-height: min(640px, calc(100vh - 40px));
      overflow: auto;
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 16px 50px var(--shadow);
    }
    .detail-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }
    .detail-head h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }
    .detail-body {
      padding: 16px 18px;
    }
    .detail-close {
      width: 28px;
      height: 28px;
      padding: 0;
      border-color: var(--line-strong);
      background: var(--field);
      color: var(--ink);
    }
    .rows { display: grid; gap: 9px; margin-top: 10px; }
    .row {
      min-width: 0;
      display: grid;
      gap: 3px;
      padding-bottom: 9px;
      border-bottom: 1px solid var(--soft);
    }
    .row:last-child { padding-bottom: 0; border-bottom: 0; }
    .row-top {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .row-id {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 600;
    }
    .row-actions {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .row-action {
      width: 28px;
      min-width: 28px;
      height: 24px;
      padding: 0;
      border-color: var(--line-strong);
      background: var(--field);
      color: var(--ink);
      font-size: 12px;
      line-height: 1;
    }
    .row-text {
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .pill {
      flex: 0 0 auto;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      padding: 1px 7px;
      color: var(--muted);
      font-size: 11px;
      background: var(--field);
    }
    .pill.on { border-color: var(--ink); color: var(--ink); }
    .empty { color: var(--muted); font-size: 12px; }
    .muted { color: var(--muted); }
    .approval {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--overlay);
      z-index: 20;
    }
    .approval.visible { display: flex; }
    .approval-panel {
      width: min(620px, 100%);
      max-height: min(680px, calc(100vh - 40px));
      overflow: auto;
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 16px 50px var(--shadow);
    }
    .approval-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }
    .approval-head h2 {
      margin: 0 0 4px;
      font-size: 15px;
      letter-spacing: 0;
    }
    .approval-body {
      padding: 16px 18px;
      display: grid;
      gap: 12px;
    }
    .approval-row { display: grid; gap: 4px; }
    .approval-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    .approval-value {
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }
    .approval-payload {
      margin: 0;
      max-height: 220px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--side);
      padding: 10px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .approval-actions {
      padding: 14px 18px 16px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
      .workspace { border-right: 0; }
      /* Overlay drawer instead of carving 38vh off the conversation. */
      aside {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: min(86vw, 360px);
        z-index: 40;
        border-left: 1px solid var(--line);
        box-shadow: -16px 0 48px var(--shadow);
      }
      .feed-user .feed-body { max-width: 88%; }
      header { padding: 10px 12px; }
      .brand strong { font-size: 14px; white-space: nowrap; }
      .brand .meta { display: none; }
      #statusText { display: none; }
      .cwd-chip { max-width: 38vw; }
      #feed { padding-left: 14px; padding-right: 14px; }
      footer { padding-left: 12px; padding-right: 12px; }
    }
  </style>
</head>
<body>
<main id="app" class="app">
  <section class="workspace">
    <header>
      <div class="brand">
        <strong>pie web</strong>
        <span id="cwd" class="cwd-chip"></span>
        <span id="model" class="meta"></span>
      </div>
      <div class="header-actions">
        <span id="status" class="run-state"><span class="dot"></span><span id="statusText">ready</span></span>
        <button type="button" class="sidebar-toggle icon-button" id="sidebarToggle" title="Hide sidebar" aria-label="Hide sidebar">◨</button>
        <button type="button" class="theme-toggle icon-button" id="themeToggle" title="Switch to dark theme" aria-label="Switch to dark theme">◐</button>
      </div>
    </header>
    <div class="content">
      <div id="poll"></div>
      <section id="feed" aria-live="polite"></section>
    </div>
    <footer>
      <div id="completionPopup" class="completion-popup"></div>
      <div id="attachmentStrip" class="attachment-strip"></div>
      <form id="form">
        <textarea id="input" placeholder="Message pie, or type /help"></textarea>
        <button type="button" class="secondary icon-button" id="attachImage" title="Attach images" aria-label="Attach images">📎</button>
        <button type="submit" class="icon-button" title="Send" aria-label="Send">↑</button>
        <button type="button" class="secondary icon-button" id="abort" title="Abort" aria-label="Abort">■</button>

function currentTheme() {
  return document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';

function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  const next = theme === 'dark' ? 'light' : 'dark';
  themeToggle.textContent = theme === 'dark' ? '☀' : '◐';
  themeToggle.title = 'Switch to ' + next + ' theme';
  themeToggle.setAttribute('aria-label', 'Switch to ' + next + ' theme');
  try { localStorage.setItem(THEME_KEY, theme); } catch (_) {}
}

function applySidebarHidden(hidden, persist) {

    sidebarToggle.setAttribute('aria-label', 'Show sidebar');
    sidebarToggle.setAttribute('aria-pressed', 'true');

    sidebarToggle.setAttribute('aria-pressed', 'false');

  if (persist) {
    try { localStorage.setItem(SIDEBAR_KEY, hidden ? 'hidden' : 'visible'); } catch (_) {}

}

try { savedSidebar = localStorage.getItem(SIDEBAR_KEY); } catch (_) {}

});

function node(tag, attrs = {}, children = []) {
  const el = document.createElement(tag);
  for (const [key, value] of Object.entries(attrs)) {
    if (key === 'class') el.className = value;
    else if (key === 'text') el.textContent = value;
    else el.setAttribute(key, value);
  }
  for (const child of children) el.append(child);
  return el;
}

function detailRows(items) {
  if (!items.length) return empty();
  return node('div', { class: 'rows' }, items.map((item) => node('div', { class: 'row' }, [
    node('div', { class: 'row-text', text: item })
  ])));
}

function showDetail(title, items) {
  detailTitle.textContent = title;
  detailBody.replaceChildren(detailRows(items));
  detailModal.className = 'detail-modal visible';
}

function hideDetail() {
  detailModal.className = 'detail-modal';
  detailBody.replaceChildren();
}

function metric(label, value, detailTitle, detailItems = []) {
  const tag = detailTitle ? 'button' : 'div';
  const attrs = detailTitle ? { class: 'metric', type: 'button' } : { class: 'metric' };
  const el = node(tag, attrs, [
    node('b', { text: String(value) }),
    node('span', { text: label })
  ]);
  if (detailTitle) {
    el.addEventListener('click', () => showDetail(detailTitle, detailItems));
  }
  return el;
}

function section(title, count, body) {
  return node('section', { class: 'side-section' }, [
    node('div', { class: 'section-head' }, [
      node('h2', { text: title }),
      node('span', { class: 'count', text: count })
    ]),
    body
  ]);
}

function metrics(items) {
  return node('div', { class: 'metrics' }, items.map(([label, value, title, detailItems]) => metric(label, value, title, detailItems || [])));
}

function empty(label = 'none') {
  return node('div', { class: 'empty', text: label });
}

function hideCompletions() {
  completionItems = [];
  completionIndex = 0;
  completionPopup.className = 'completion-popup';
  completionPopup.replaceChildren();
}

function renderCompletions() {
  if (!completionItems.length) {
    completionPopup.className = 'completion-popup';
    completionPopup.replaceChildren();
    return;
  }
  completionPopup.className = 'completion-popup visible';
  completionPopup.replaceChildren(...completionItems.map((item, index) => {
    const button = node('button', {
      class: index === completionIndex ? 'completion-item selected' : 'completion-item',
      type: 'button',
      text: item
    });
    button.addEventListener('mousedown', (event) => event.preventDefault());
    button.addEventListener('click', () => applyCompletion(index, false));
    return button;
  }));
}

function canComplete(text) {
  const trimmed = String(text ?? '').trimStart();
  return trimmed.startsWith('/') && !/\s/.test(trimmed.slice(1));
}

async function refreshCompletions() {
  const text = input.value;
  if (!canComplete(text)) {
    hideCompletions();
    return;
  }
  const requestSeq = ++completionRequestSeq;
  const response = await fetch('complete', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ text })
  });
  if (requestSeq !== completionRequestSeq) return;
  if (!response.ok) {
    hideCompletions();
    return;
  }
  const data = await response.json();
  completionItems = Array.isArray(data.completions) ? data.completions : [];
  completionIndex = 0;
  renderCompletions();
}

function applyCompletion(index = completionIndex, keepPopup = true) {
  if (!completionItems.length) return;
  const bounded = ((index % completionItems.length) + completionItems.length) % completionItems.length;
  completionIndex = bounded;
  input.value = completionItems[bounded];
  input.focus();
  if (keepPopup) {
    renderCompletions();
  } else {
    hideCompletions();
  }
}

function moveCompletion(delta) {
  if (!completionItems.length) return;
  completionIndex = (completionIndex + delta + completionItems.length) % completionItems.length;
  renderCompletions();
}

function pill(label, on) {
  return node('span', { class: on ? 'pill on' : 'pill', text: label });
}

function triggerNowButton(rule) {

  button.addEventListener('click', async (event) => {
    event.preventDefault();
    event.stopPropagation();
    button.disabled = true;

      await fetch('trigger/immediate', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ id: rule.full_id || rule.id })
      });
    } finally {
      button.disabled = false;
    }
  });
  return button;
}

function renderList(items) {

function renderSkills(skills) {

    skill.name + ' / ' + skill.source + ' / ' + (skill.enabled ? 'enabled' : 'disabled') + ' / path ' + skill.file_path;

  );

    .filter((skill) => skill.enabled)

    .filter((skill) => !skill.enabled)

function escapeHtml(text) {
  return String(text ?? '').replace(/[&<>"']/g, (ch) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  })[ch]);
}

function escapeAttr(text) {
  return escapeHtml(text).replace(/`/g, '&#96;');
}

function safeHref(url) {
  const trimmed = String(url ?? '').trim();
  if (/^(https?:|mailto:|#|\/)/i.test(trimmed)) return trimmed;
  return '';
}

function renderInlineMarkdown(text) {
  let html = escapeHtml(text);
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  html = html.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_m, label, url) => {
    const href = safeHref(url.replace(/&amp;/g, '&'));
    if (!href) return label;
    return '<a href="' + escapeAttr(href) + '" target="_blank" rel="noreferrer">' + label + '</a>';
  });
  return html;
}

function paragraphHtml(lines) {
  return '<p>' + lines.map(renderInlineMarkdown).join('<br>') + '</p>';
}

function markdownToHtml(markdown) {
  const lines = String(markdown ?? '').replace(/\r\n/g, '\n').split('\n');
  const out = [];
  let paragraph = [];
  let list = null;
  let quote = [];
  let inCode = false;
  let code = [];

  function flushParagraph() {
    if (!paragraph.length) return;
    out.push(paragraphHtml(paragraph));
    paragraph = [];
  }
  function flushList() {
    if (!list) return;
    out.push('<' + list.type + '>' + list.items.map((item) => '<li>' + renderInlineMarkdown(item) + '</li>').join('') + '</' + list.type + '>');
    list = null;
  }
  function flushQuote() {
    if (!quote.length) return;
    out.push('<blockquote>' + quote.map(renderInlineMarkdown).join('<br>') + '</blockquote>');
    quote = [];
  }

  for (const line of lines) {
    const fence = line.match(/^```/);
    if (fence) {
      if (inCode) {
        out.push('<pre><code>' + escapeHtml(code.join('\n')) + '</code></pre>');
        code = [];
        inCode = false;
      } else {
        flushParagraph();
        flushList();
        flushQuote();
        inCode = true;
      }
      continue;
    }
    if (inCode) {
      code.push(line);
      continue;
    }
    if (!line.trim()) {
      flushParagraph();
      flushList();
      flushQuote();
      continue;
    }
    const heading = line.match(/^(#{1,6})\s+(.+)$/);
    if (heading) {
      flushParagraph();
      flushList();
      flushQuote();
      const level = heading[1].length;
      out.push('<h' + level + '>' + renderInlineMarkdown(heading[2]) + '</h' + level + '>');
      continue;
    }
    const unordered = line.match(/^\s*[-*]\s+(.+)$/);
    const ordered = line.match(/^\s*\d+\.\s+(.+)$/);
    if (unordered || ordered) {
      flushParagraph();
      flushQuote();
      const type = unordered ? 'ul' : 'ol';
      if (!list || list.type !== type) flushList();
      if (!list) list = { type, items: [] };
      list.items.push((unordered || ordered)[1]);
      continue;
    }
    const quoted = line.match(/^>\s?(.+)$/);
    if (quoted) {
      flushParagraph();
      flushList();
      quote.push(quoted[1]);
      continue;
    }
    flushList();
    flushQuote();
    paragraph.push(line);
  }
  if (inCode) out.push('<pre><code>' + escapeHtml(code.join('\n')) + '</code></pre>');
  flushParagraph();
  flushList();
  flushQuote();
  return out.join('');
}

function isToolStartLine(line) {
  return /(^|\s)⚙ /.test(line);
}

function isToolOutputLine(line) {
  return /^((\d\d:\d\d|\d\d-\d\d \d\d:\d\d) )? {4}/.test(line);
}

function renderFeedLines(lines) {
  const nodes = [];
  let tool = null;
  function flushTool() {
    if (!tool) return;
    const details = node('details', { class: 'tool-details' }, [
      node('summary', { text: tool.summary }),
      node('pre', { class: 'tool-output', text: tool.output.join('\n') || 'no output' })
    ]);
    nodes.push(details);
    tool = null;
  }

  for (const line of lines) {
    if (isToolStartLine(line)) {
      flushTool();
      tool = { summary: line, output: [] };
      continue;
    }
    if (tool && (isToolOutputLine(line) || line.trim() === '')) {
      tool.output.push(line.replace(/^((\d\d:\d\d|\d\d-\d\d \d\d:\d\d) )? {4}/, ''));
      continue;
    }
    flushTool();
    nodes.push(node('div', { class: 'line', text: line }));
  }
  flushTool();
  return nodes;
}

function metaLabel(_timestamp, label) {
  // Timestamps moved to hover tooltips (see feedHead) — repeated per-line dates were
  // the single largest source of visual noise.
  return label;
}

async function copyText(text) {
  const value = String(text ?? '');
  if (navigator.clipboard && window.isSecureContext) {
    await navigator.clipboard.writeText(value);
    return;
  }
  const textarea = node('textarea', { 'aria-hidden': 'true' });
  textarea.value = value;
  textarea.style.position = 'fixed';
  textarea.style.left = '-9999px';
  textarea.style.top = '0';
  textarea.style.opacity = '0';
  document.body.append(textarea);
  textarea.focus();
  textarea.select();
  const ok = document.execCommand('copy');
  textarea.remove();
  if (!ok) throw new Error('copy failed');
}

function copyButton(text) {
  const button = node('button', {
    class: 'copy-button icon-button',
    type: 'button',
    text: '⧉',
    title: 'Copy message',
    'aria-label': 'Copy message'
  });
  button.addEventListener('click', async (event) => {
    event.preventDefault();
    event.stopPropagation();
    const original = button.textContent;
    try {
      await copyText(text);
      button.textContent = '✓';
      button.title = 'Copied';
      button.setAttribute('aria-label', 'Copied');
      button.classList.remove('copy-error');
      button.classList.add('copied');
    } catch (_) {
      button.textContent = '!';
      button.title = 'Copy failed';
      button.setAttribute('aria-label', 'Copy failed');
      button.classList.remove('copied');
      button.classList.add('copy-error');
    }
    window.setTimeout(() => {
      button.textContent = original;
      button.title = 'Copy message';
      button.setAttribute('aria-label', 'Copy message');
      button.classList.remove('copied', 'copy-error');
    }, 1400);
  });
  return button;
}

function feedHead(block, label, copyTextValue) {
  const head = node('div', { class: 'feed-head' }, [copyButton(copyTextValue)]);
  if (label) head.prepend(node('div', { class: 'feed-meta', text: label }));
  if (block.timestamp) head.title = block.timestamp;
  return head;
}

function renderMarkdownBlock(block, className, label) {
  const outer = node('article', { class: 'feed-block ' + className }, [
    feedHead(block, label, block.text || '')
  ]);
  const body = node('div', { class: 'feed-body markdown' });
  body.innerHTML = markdownToHtml(block.text);
  outer.append(body);
  return outer;
}

function renderFeedBlocks(blocks) {
  if (!Array.isArray(blocks)) return null;
  const nodes = [];
  let pendingTool = null;
  function flushTool() {
    if (!pendingTool) return;
    const toolText = [
      'tool: ' + pendingTool.name + pendingTool.args,
      pendingTool.output.join('\n') || 'no output'
    ].join('\n');
    const details = node('details', { class: 'tool-details feed-block' }, [
      node('summary', {}, [
        node('span', { text: metaLabel(pendingTool.timestamp, pendingTool.name + pendingTool.args) }),
        copyButton(toolText)
      ]),
      node('pre', { class: 'tool-output', text: pendingTool.output.join('\n') || 'no output' })
    ]);
    nodes.push(details);
    pendingTool = null;
  }

  for (const block of blocks) {
    if (block.kind === 'tool') {
      flushTool();
      pendingTool = {
        name: block.name || '',
        args: block.args || '',
        timestamp: block.timestamp,
        output: []
      };
      continue;
    }
    if (block.kind === 'tool_result') {
      if (!pendingTool) {
        pendingTool = { name: 'tool', args: '', timestamp: block.timestamp, output: [] };
      }
      pendingTool.output.push(...(block.lines || []));
      continue;
    }
    flushTool();
    if (block.kind === 'assistant') {
      nodes.push(renderMarkdownBlock(block, 'feed-assistant', ''));
    } else if (block.kind === 'plain') {
      if (block.level === 'qr') continue; // terminal-only QR art; the browser is already here
      nodes.push(node('article', { class: 'feed-block feed-plain level_' + block.level, title: block.timestamp || '' }, [
        feedHead(block, '', block.text || ''),
        node('div', { class: 'feed-body', text: block.text || '' })
      ]));
    } else if (block.kind === 'user') {
      nodes.push(node('article', { class: 'feed-block feed-user', title: block.timestamp || '' }, [
        feedHead(block, '', block.text || ''),
        node('div', { class: 'feed-body', text: block.text || '' })
      ]));
    } else if (block.kind === 'thinking') {
      nodes.push(node('article', { class: 'feed-block feed-thinking' }, [
        feedHead(block, 'thinking', block.text || ''),
        node('div', { class: 'feed-body', text: block.text || '' })
      ]));
    }
  }
  flushTool();
  return nodes;
}

function render(snapshot) {
  model.textContent = snapshot.model;
  const cwdText = String(snapshot.cwd || '');
  cwd.textContent = cwdText || '.';
  cwd.title = cwdText;
  session.textContent = snapshot.session_id;
  const stateText = snapshot.busy
    ? ('working' + (snapshot.queued_count ? ' / ' + snapshot.queued_count + ' queued' : ''))
    : ('ready' + (snapshot.queued_count ? ' / ' + snapshot.queued_count + ' queued' : ''));
  statusText.textContent = stateText;
  status.className = snapshot.busy ? 'run-state busy' : 'run-state';
  if (snapshot.latest_trigger_poll) {
    poll.textContent = 'Polling / ' + snapshot.latest_trigger_poll.checked_at + ' / '
      + snapshot.latest_trigger_poll.source_label + ' / '
      + snapshot.latest_trigger_poll.event_label + ' / '
      + snapshot.latest_trigger_poll.summary;
    poll.className = 'visible';
  } else {
    poll.textContent = '';
    poll.className = '';
  }
  feed.replaceChildren(...(renderFeedBlocks(snapshot.feed_blocks) || renderFeedLines(snapshot.feed_lines)));
  feed.scrollTop = feed.scrollHeight;
  renderSidebar(snapshot);
  renderApproval(snapshot);
}

function insertInputText(text) {
  const start = input.selectionStart ?? input.value.length;
  const end = input.selectionEnd ?? input.value.length;
  input.value = input.value.slice(0, start) + text + input.value.slice(end);
  const next = start + text.length;
  input.selectionStart = next;
  input.selectionEnd = next;
  input.dispatchEvent(new Event('input', { bubbles: true }));
}

function isInputComposing(event) {
  return Boolean(
    event.isComposing ||
    inputComposing ||
    event.keyCode === 229 ||
    Date.now() - inputCompositionEndedAt < 50
  );
}

function humanBytes(bytes) {
  const value = Number(bytes || 0);
  if (value < 1024) return value + ' B';
  if (value < 1024 * 1024) return (value / 1024).toFixed(1) + ' KB';
  return (value / 1024 / 1024).toFixed(1) + ' MB';
}

function renderAttachments() {
  if (!pendingImages.length) {
    attachmentStrip.className = 'attachment-strip';
    attachmentStrip.replaceChildren();
    return;
  }
  attachmentStrip.className = 'attachment-strip visible';
  attachmentStrip.replaceChildren(...pendingImages.map((image, index) => {
    const remove = node('button', {
      type: 'button',
      text: '×',
      title: 'Remove attachment',
      'aria-label': 'Remove attachment'
    });
    remove.addEventListener('click', () => {
      pendingImages.splice(index, 1);
      renderAttachments();
      input.focus();
    });
    return node('div', { class: 'attachment-chip' }, [
      node('span', { text: image.name + ' · ' + humanBytes(image.size) }),
      remove
    ]);
  }));
}

function clearAttachments() {
  pendingImages = [];
  renderAttachments();
}

function readImageFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.addEventListener('load', () => {
      const result = String(reader.result || '');
      const data = result.includes(',') ? result.split(',').pop() : result;
      resolve({
        name: file.name || 'clipboard image',
        size: file.size || 0,
        data
      });
    });
    reader.addEventListener('error', () => reject(reader.error || new Error('read image failed')));
    reader.readAsDataURL(file);
  });
}

async function addImageFiles(files) {
  const images = Array.from(files || []).filter((file) => String(file.type || '').startsWith('image/'));
  if (!images.length) return;
  for (const file of images) {
    if (pendingImages.length >= MAX_IMAGE_ATTACHMENTS) break;
    pendingImages.push(await readImageFile(file));
  }
  renderAttachments();
}

// Relay deployments may have no snapshot yet (agent offline); tolerate a non-OK state.
fetch('state').then((r) => (r.ok ? r.json() : null)).then((s) => s && render(s)).catch(() => {});
const events = new EventSource('events');
events.addEventListener('snapshot', (event) => render(JSON.parse(event.data)));
// Served only by the relay worker: shows when the local agent is connected/offline.
events.addEventListener('relay_status', (event) => {
  const status = JSON.parse(event.data);
  let banner = document.getElementById('relay-offline-banner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'relay-offline-banner';
    banner.style.cssText = 'display:none;position:fixed;top:0;left:0;right:0;z-index:60;text-align:center;padding:6px 12px;background:#7f1d1d;color:#fecaca;font:600 13px system-ui';
    banner.textContent = 'agent offline — waiting for the local pie session to reconnect';
    document.body.appendChild(banner);
  }
  banner.style.display = status.agent_online ? 'none' : 'block';
});

// On phones, tapping a form button first blurs the textarea, which dismisses the
// soft keyboard and relayouts the page before the click is dispatched — the tap lands
// on nothing and "send" appears dead. Suppress focus steal so the click always lands.
for (const formButton of form.querySelectorAll('button')) {
  formButton.addEventListener('pointerdown', (event) => event.preventDefault());
}

form.addEventListener('submit', async (event) => {
  event.preventDefault();
  const text = input.value;
  const images = pendingImages.map((image) => ({ name: image.name, data: image.data }));
  if (!text.trim() && !images.length) return;
  input.value = '';
  clearAttachments();
  hideCompletions();
  await fetch('prompt', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ text, images })
  });
});

abortButton.addEventListener('click', () => fetch('abort', { method: 'POST' }));
attachImageButton.addEventListener('click', () => imageInput.click());
imageInput.addEventListener('change', async () => {
  await addImageFiles(imageInput.files);
  imageInput.value = '';
  input.focus();
});
closeDetail.addEventListener('click', hideDetail);
detailModal.addEventListener('click', (event) => {
  if (event.target === detailModal) hideDetail();
});
async function resolveApproval(approve) {
  await fetch('control-plane/resolve', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ approve })
  });
}
approveApproval.addEventListener('click', () => resolveApproval(true));
denyApproval.addEventListener('click', () => resolveApproval(false));
input.addEventListener('input', refreshCompletions);
input.addEventListener('compositionstart', () => {
  inputComposing = true;
});
input.addEventListener('compositionend', () => {
  inputComposing = false;
  inputCompositionEndedAt = Date.now();
});
input.addEventListener('paste', async (event) => {
  const files = [];
  for (const item of Array.from(event.clipboardData?.items || [])) {
    if (item.kind === 'file') {
      const file = item.getAsFile();
      if (file && String(file.type || '').startsWith('image/')) files.push(file);
    }
  }
  if (!files.length) return;
  event.preventDefault();
  await addImageFiles(files);
});
input.addEventListener('keydown', (event) => {
  if (event.key === 'Enter' && isInputComposing(event)) {
    return;
  } else if (event.key === 'Enter' && event.metaKey) {
    event.preventDefault();
    event.stopPropagation();
    insertInputText('\n');
  } else if (approval.classList.contains('visible') && event.key === 'Enter') {
    event.preventDefault();
  } else if (event.key === 'Enter') {
    event.preventDefault();
    form.requestSubmit();
  } else if (event.key === 'Tab' && completionItems.length) {
    event.preventDefault();
    applyCompletion(completionIndex, true);
    moveCompletion(1);
  } else if (event.key === 'ArrowDown' && completionItems.length) {
    event.preventDefault();
    moveCompletion(1);
  } else if (event.key === 'ArrowUp' && completionItems.length) {
    event.preventDefault();
    moveCompletion(-1);
  } else if (event.key === 'Escape') {
    if (approval.classList.contains('visible')) {
      resolveApproval(false);
    } else if (detailModal.classList.contains('visible')) {
      hideDetail();
    } else if (completionItems.length) {
      hideCompletions();
    } else {
      fetch('abort', { method: 'POST' });
    }
  }
});
document.addEventListener('keydown', (event) => {
  if (approval.classList.contains('visible') && event.key === 'Enter' && event.metaKey) {
    event.preventDefault();
    resolveApproval(true);
  } else if (approval.classList.contains('visible') && event.key === 'Escape') {
    event.preventDefault();
    resolveApproval(false);
  } else if (detailModal.classList.contains('visible') && event.key === 'Escape') {
    event.preventDefault();
    hideDetail();
  }
});

</script>
</body>
