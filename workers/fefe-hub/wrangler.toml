name = "pie-hub"
main = "src/index.ts"
compatibility_date = "2026-05-30"

[vars]
HUB_VERSION = "0.1.0"

[[d1_databases]]
binding = "DB"
database_name = "pie_fefe_hub"
database_id = "5fdff213-1e2f-464a-87e0-a62b8065a5a5"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "MAILBOX"
class_name = "AgentMailbox"

[[durable_objects.bindings]]
name = "SESSION_RELAY"
class_name = "SessionRelay"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentMailbox"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["SessionRelay"]
